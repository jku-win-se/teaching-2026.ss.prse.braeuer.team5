name: CI - Quality Check
on:
  push:
    branches-ignore: [main]
  pull_request:
    branches: [main]

jobs:
  check-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm install 

      # FIX 2: PMD auf dem Server installieren
      - name: Setup PMD
        uses: pmd/pmd-github-action@v2
        with:
          version: '7.0.0' # Aktuelle PMD Version

      - name: Create Reports Directory
        run: mkdir -p reports

      # Wir nutzen die Action direkt, das ist sicherer als das manuelle "pmd check"
      - name: Run PMD
        uses: pmd/pmd-github-action@v2
        id: pmd
        with:
          version: '7.0.0'
          sourcePath: 'src'
          rulesets: 'pmd-ruleset.xml' # Prüfe, ob der Name exakt so stimmt!
          analyzeModifiedFilesOnly: false
          createDefaultConfiguration: false

      - name: Move PMD Report to Reports Folder
        if: always()
        run: |
          # Die Action erzeugt standardmäßig eine Datei namens pmd-report.sarif oder ähnlich
          # Wir erzwingen hier manuell die Erstellung für deine Artefakte:
          pmd check -d ./src -R pmd-ruleset.xml -f html > reports/pmd-report.html || echo "PMD HTML Erstellung fehlgeschlagen"
          pmd check -d ./src -R pmd-ruleset.xml -f text > reports/pmd-report.txt || echo "PMD Text Erstellung fehlgeschlagen"


      # 2. vitest with report
      - name: Run Tests
        run: npm run test:ci

      # 3. Reports hochladen (Artifacts)
      - name: Upload All Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: full-quality-stack
          path: reports/

name: CI - Quality Check
on:
  push:
    branches-ignore: [main]
  pull_request:
    branches: [main]

jobs:
  check-quality:
    runs-on: ubuntu-latest
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_PUB_KEY: ${{ secrets.VITE_SUPABASE_PUB_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Run ESLint
        run: |
          mkdir -p reports
          npx eslint . --format json --output-file reports/eslint-report.json || true
          npx eslint . --format html --output-file reports/eslint-report.html || true


      - name: Debug Environment
        run: |
          echo "URL length: ${#VITE_SUPABASE_URL}"
          echo "Key length: ${#VITE_SUPABASE_PUB_KEY}"
      
      - name: Run Tests
        run: npm run test:ci
      
      - name: Upload Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-reports
          path: reports/

      - name: Test Build App 
        run: npx vite build --mode ci

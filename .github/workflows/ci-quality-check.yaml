name: CI - Quality Check
on:
  push:
    branches-ignore: [main]
  pull_request:
    branches: [main]

jobs:
  check-quality:
    runs-on: ubuntu-latest
    env:
      VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
      VITE_SUPABASE_PUB_KEY: ${{ secrets.VITE_SUPABASE_PUB_KEY }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Install PMD
        run: |
          wget https://github.com/pmd/pmd/releases/download/pmd_releases/7.0.0/pmd-dist-7.0.0-bin.zip
          unzip -q pmd-dist-7.0.0-bin.zip
          echo "$PWD/pmd-bin-7.0.0/bin" >> $GITHUB_PATH

      - name: Run PMD
        run: |
          mkdir -p reports

          touch reports/pmd-report.txt reports/pmd-report.html reports/pmd-report.xml

          pmd check -d ./src -R pmd-ruleset.xml -f text > reports/pmd-report.txt || true
          pmd check -d ./src -R pmd-ruleset.xml -f html > reports/pmd-report.html || true
          pmd check -d ./src -R pmd-ruleset.xml -f xml  > reports/pmd-report.xml  || true

      - name: Run Tests
        run: npm run test:ci

      - name: Upload Reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-reports
          path: reports/
